services:
  postgres:
    image: postgres:17-alpine
    container_name: jdk25-startup-postgres
    environment:
      POSTGRES_DB: startup_demo
      POSTGRES_USER: startup
      POSTGRES_PASSWORD: startup
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U startup -d startup_demo"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: jdk25-startup-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - redis-data:/data

  kafka:
    image: apache/kafka:3.9.1
    container_name: jdk25-startup-kafka
    hostname: kafka
    environment:
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://127.0.0.1:19092
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 40

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: jdk25-startup-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    container_name: jdk25-startup-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  gateway-baseline:
    profiles: ["apps", "baseline"]
    build:
      context: .
      dockerfile: Dockerfile.jvm
      args:
        BASE_IMAGE: ${JAVA_DOCKER_BASE_IMAGE:-eclipse-temurin:25-jdk}
    image: jdk25-startup-gateway-demo:latest
    container_name: gateway-baseline
    environment:
      APP_RUNTIME_MODE: baseline
      APP_NAME: gateway-demo
      APP_JDK: "25"
      SERVER_PORT: "8080"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/startup_demo
      POSTGRES_USER: startup
      POSTGRES_PASSWORD: startup
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway-cds:
    profiles: ["apps", "cds"]
    image: jdk25-startup-gateway-demo:latest
    container_name: gateway-cds
    environment:
      APP_RUNTIME_MODE: cds
      APP_NAME: gateway-demo
      APP_JDK: "25"
      SERVER_PORT: "8080"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/startup_demo
      POSTGRES_USER: startup
      POSTGRES_PASSWORD: startup
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    command:
      - -Xshare:on
      - -XX:SharedArchiveFile=/app/build/runtime-artifacts/cds-base.jsa
      - -cp
      - /app/app.jar:/app/lib/*
      - com.example.startupdemo.app.StartupOptimizationApplication
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway-appcds:
    profiles: ["apps", "appcds"]
    image: jdk25-startup-gateway-demo:latest
    container_name: gateway-appcds
    environment:
      APP_RUNTIME_MODE: appcds
      APP_NAME: gateway-demo
      APP_JDK: "25"
      SERVER_PORT: "8080"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/startup_demo
      POSTGRES_USER: startup
      POSTGRES_PASSWORD: startup
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    command:
      - -Xshare:on
      - -XX:SharedArchiveFile=/app/build/runtime-artifacts/appcds.jsa
      - -cp
      - /app/app.jar:/app/lib/*
      - com.example.startupdemo.app.StartupOptimizationApplication
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway-crac:
    profiles: ["apps", "crac"]
    image: jdk25-startup-gateway-demo:latest
    container_name: gateway-crac
    environment:
      APP_RUNTIME_MODE: crac
      APP_NAME: gateway-demo
      APP_JDK: "25"
      SERVER_PORT: "8080"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/startup_demo
      POSTGRES_USER: startup
      POSTGRES_PASSWORD: startup
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    command:
      - -XX:CRaCRestoreFrom=/app/build/runtime-artifacts/crac-checkpoint
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway-native:
    profiles: ["apps", "native"]
    build:
      context: .
      dockerfile: Dockerfile.native
      target: runtime
    image: jdk25-startup-gateway-native:latest
    container_name: gateway-native
    environment:
      APP_RUNTIME_MODE: native
      APP_NAME: gateway-demo
      APP_JDK: "25"
      SERVER_PORT: "8080"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/startup_demo
      POSTGRES_USER: startup
      POSTGRES_PASSWORD: startup
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
